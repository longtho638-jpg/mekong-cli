# Mekong CLI — 3-Layer Deploy Architecture (Cloudflare-only)
# User chọn layers phù hợp quy mô. Không bắt buộc dùng tất cả.

layers:
  frontend:
    platform: "cloudflare-pages"
    purpose: "Static HTML, landing pages, docs, Next.js export"
    cost: "$0"
    template: "mekong/infra/templates/cf-pages/"
    when: "Mọi dự án đều cần"
    deploy: "git push → auto build"
    limits: "Unlimited sites, 500 builds/month free"

  edge-api:
    platform: "cloudflare-workers"
    purpose: "Serverless API, webhooks, rate limiting, KV cache"
    cost: "$0"
    template: "mekong/infra/templates/cf-workers/"
    when: "Cần API nhẹ, webhooks, hoặc middleware"
    deploy: "wrangler deploy"
    limits: "100K req/day free, 10ms CPU/req"

  backend:
    platform: "cloudflare-workers"
    purpose: "Heavy API, D1 database, KV storage, R2 files, Queues"
    cost: "$0"
    template: "mekong/infra/templates/cf-workers/"
    when: "Cần persistent storage, background jobs, LLM gateway"
    deploy: "wrangler deploy"
    notes: "Use Workers + D1 + KV + R2 for everything"
    limits: "D1: 5GB free, R2: 10GB free, KV: 100K writes/day"

scales:
  solo:
    description: "1 người, side project"
    layers: ["frontend"]
    estimated_cost: "$0/month"

  startup:
    description: "MVP, 2-5 người"
    layers: ["frontend", "edge-api"]
    estimated_cost: "$0/month"

  scale:
    description: "Scaling, 5+ người, revenue"
    layers: ["frontend", "edge-api", "backend"]
    estimated_cost: "$0/month"

benefits:
  - "100% Cloudflare — single platform, zero complexity"
  - "Free tier — all 3 layers on CF free plan"
  - "Global edge — deploy to 300+ locations automatically"
  - "Scale độc lập — chỉ scale cái cần thiết"
  - "Deploy từ CLI — wrangler deploy or git push"
  - "D1+KV+R2+Queues — full backend stack on Workers"
