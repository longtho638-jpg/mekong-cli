# Cloudflare Workers — Edge API
# Usage: cp mekong/infra/templates/cf-workers/* your-api/
name = "{{PROJECT_NAME}}-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# KV namespace (create: wrangler kv:namespace create "CACHE")
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-id"

# D1 database (create: wrangler d1 create your-db)
# [[d1_databases]]
# binding = "DB"
# database_name = "your-db"
# database_id = "your-db-id"
