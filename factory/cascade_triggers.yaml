# Vibe Coding Factory — Cascade Trigger Keywords
# Defines keyword signals that indicate a layer transition should be suggested.

triggers:
  founder_to_business:
    description: "Founder output mentions revenue, growth, or team ops → suggest Business layer"
    keywords:
      - revenue target
      - sales goal
      - marketing budget
      - hire
      - recruit
      - client acquisition
      - MRR
      - ARR
      - revenue
      - sales
      - marketing
      - hiring
      - customers
      - growth
      - churn
      - pipeline
      - leads
      - GTM
      - go-to-market
      - partnerships
      - pricing
      - doanh thu
      - muc tieu ban
      - tuyen dung
    suggest_commands:
      - /sales
      - /marketing
      - /pipeline
      - /leadgen
      - /hr

  business_to_product:
    description: "Business output mentions features or product needs → suggest Product layer"
    keywords:
      - feature
      - product
      - MVP
      - launch
      - release
      - user story
      - requirement
      - san pham
      - tinh nang
      - roadmap
      - backlog
      - scope
      - prototype
      - spec
      - persona
      - feedback
      - sprint
    suggest_commands:
      - /plan
      - /roadmap
      - /sprint
      - /scope

  product_to_engineering:
    description: "Product output mentions implementation or build → suggest Engineering layer"
    keywords:
      - implement
      - build
      - create
      - develop
      - code
      - API
      - database
      - frontend
      - backend
      - xay dung
      - trien khai
      - lap trinh
      - schema
      - component
      - endpoint
      - architecture
      - engineer
      - technical
    suggest_commands:
      - /cook
      - /code
      - /arch
      - /api

  engineering_to_ops:
    description: "Engineering output mentions deployment or monitoring → suggest Ops layer"
    keywords:
      - deploy
      - ship
      - release
      - monitor
      - scale
      - trien khai
      - van hanh
      - giam sat
      - production
      - CI/CD
      - health
      - uptime
      - rollback
      - environment
      - security
      - audit
      - infrastructure
      - smoke test
    suggest_commands:
      - /deploy
      - /ship
      - /health
      - /audit
