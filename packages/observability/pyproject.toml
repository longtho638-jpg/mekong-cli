[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mekong-observability"
version = "0.1.0"
description = "Langfuse observability layer for Mekong CLI"
requires-python = ">=3.9"
dependencies = [
    "langfuse>=2.0.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]
