# Mekong CLI Core — Default Configuration
version: "1.0.0"

llm:
  provider: openrouter
  model: anthropic/claude-sonnet-4
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3

execution:
  default_timeout_seconds: 300
  max_concurrent_steps: 4
  rollback_on_failure: true

logging:
  level: info
  format: json

sops:
  templates_dir: ./src/sops/templates
  runs_dir: ./.mekong/runs

plugins: []
