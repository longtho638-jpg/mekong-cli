[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mekong-memory"
version = "0.1.0"
description = "Mem0 + Qdrant memory layer for Mekong CLI"
requires-python = ">=3.9"
dependencies = [
    "mem0ai>=0.1.0",
    "qdrant-client>=1.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]
