name: Algo Trader CI

on:
  push:
    branches: [main, master, feature/*]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'
      - '.github/workflows/algo-trader-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: apps/algo-trader

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prisma generate

      - name: Lint
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pnpm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prisma generate

      - name: Typecheck
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prisma generate

      - name: Run tests with coverage
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx jest --ci --forceExit --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prisma generate

      - name: Build backend
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pnpm run build

      # Dashboard build disabled - optional component
      # - name: Build dashboard
      #   working-directory: ${{ env.WORKING_DIRECTORY }}
      #   run: |
      #     cd dashboard
      #     pnpm install --shamefully-hoist
      #     pnpm run build

      - name: Build summary
        if: always()
        run: |
          echo "## Algo Trader CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Typecheck | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ job.status == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f apps/algo-trader/Dockerfile -t algo-trader:${{ github.sha }} .
          docker tag algo-trader:${{ github.sha }} algo-trader:latest

      - name: Test Docker image
        run: |
          docker run --rm algo-trader:${{ github.sha }} node dist/index.js --version || echo "Version check completed"

      - name: Push to GCP Artifact Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Docker for GCP
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Push to Artifact Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker tag algo-trader:${{ github.sha }} us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/algo-trader/algo-trader:${{ github.sha }}
          docker tag algo-trader:latest us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/algo-trader/algo-trader:latest
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/algo-trader/algo-trader:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/algo-trader/algo-trader:latest
