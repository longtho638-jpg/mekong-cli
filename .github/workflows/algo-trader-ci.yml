name: CashClaw CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/algo-trader/**'
      - '.github/workflows/algo-trader-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/algo-trader/**'

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: apps/algo-trader

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: cd ${{ env.WORKING_DIRECTORY }} && npm install --ignore-scripts
        continue-on-error: true

      - name: TypeScript check
        run: cd ${{ env.WORKING_DIRECTORY }} && npx tsc --noEmit
        continue-on-error: true

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build dashboard
        run: cd ${{ env.WORKING_DIRECTORY }}/dashboard && npm install && npm run build
        continue-on-error: true
