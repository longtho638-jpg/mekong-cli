name: PEV Engine CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/core/**'
      - 'tests/test_planner.py'
      - 'tests/test_executor.py'
      - 'tests/test_verifier.py'
      - 'tests/test_orchestrator_integration.py'
      - 'tests/test_orchestrator_unit.py'
      - 'tests/test_dag_scheduler.py'
      - 'tests/test_plan_constraints.py'
      - 'tests/test_dependency_inference.py'
      - 'tests/test_plan_optimizer.py'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/core/**'
      - 'tests/test_planner.py'
      - 'tests/test_executor.py'
      - 'tests/test_verifier.py'
      - 'tests/test_orchestrator_integration.py'
      - 'tests/test_orchestrator_unit.py'
      - 'tests/test_dag_scheduler.py'
      - 'tests/test_plan_constraints.py'
      - 'tests/test_dependency_inference.py'
      - 'tests/test_plan_optimizer.py'

jobs:
  pev-tests:
    name: PEV Engine Tests (Python 3.9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio pytest-cov
          pip install -e .

      - name: Run PEV test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest \
            tests/test_planner.py \
            tests/test_executor.py \
            tests/test_verifier.py \
            tests/test_orchestrator_integration.py \
            tests/test_orchestrator_unit.py \
            tests/test_dag_scheduler.py \
            tests/test_plan_constraints.py \
            tests/test_dependency_inference.py \
            tests/test_plan_optimizer.py \
            -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pev-test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 7
