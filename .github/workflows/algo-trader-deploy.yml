name: CashClaw Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/algo-trader/**'
  workflow_dispatch:

jobs:
  deploy-dashboard:
    name: Deploy Dashboard to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Dashboard
        run: cd apps/algo-trader/dashboard && npm install && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy apps/algo-trader/dashboard/dist --project-name=algo-trader-dashboard
