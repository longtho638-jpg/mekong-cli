name: CI

on:
  push:
    branches:
      - "main"
      - "master"
  pull_request:
    types: [opened, synchronize]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: BACKEND (Python / CLI / Core)
  # ------------------------------------------------------------------
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio anyio "httpx<0.28" pytest-cov
          pip install -e .

      - name: Verify CLI Entry Point
        run: mekong --help
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Lint (Ruff)
        run: ruff check src/ tests/

      - name: Test (Pytest)
        run: pytest tests/ --ignore=tests/backend --ignore=tests/e2e --ignore=tests/integration --ignore=tests/unit -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ------------------------------------------------------------------
  # JOB 3: SECURITY AUDIT (Python-focused)
  # ------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Security Scan (Bandit)
        run: bandit -r src/ -ll --exit-zero
        continue-on-error: true

      - name: Dependency Check (Safety)
        run: safety check -r requirements.txt --ignore 70612
        continue-on-error: true

      - name: Check for exposed secrets
        run: |
          echo "Checking for hardcoded secrets (not env var references)..."
          # Check for hardcoded secrets (not env var references)
          if grep -rE "(API_KEY|SECRET|PASSWORD)\s*=\s*['\"][^'\"]+['\"]" src/ --include="*.py" --include="*.ts" --include="*.js" 2>/dev/null | grep -v "test" | grep -v ".env.example" | grep -v "os.getenv" | grep -v "os.environ"; then
            echo "❌ Found hardcoded secrets in source code!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ------------------------------------------------------------------
  # JOB 2: FRONTEND (Next.js / Monorepo)
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (Monorepo)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # Turbo handles cache internally if configured, but here we just run it
      - name: Build (Docs)
        run: pnpm turbo build --filter=mekong-docs
        continue-on-error: true

      - name: Lint (Turbo)
        run: npx turbo run lint 2>/dev/null || echo "No lintable packages found"
        continue-on-error: true

      - name: Mekong Engine TypeScript Check
        run: pnpm --filter mekong-engine typecheck 2>/dev/null || echo "mekong-engine not found"
        continue-on-error: true

      # - name: Test (Turbo)
      #   run: pnpm test
