name: CI

on:
  push:
    branches:
      - "main"
      - "master"
  pull_request:
    types: [opened, synchronize]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: BACKEND (Python / CLI / Core)
  # ------------------------------------------------------------------
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff>=0.9,<1.0" pytest pytest-asyncio anyio "httpx<0.28" pytest-cov
          pip install -e .

      - name: Verify CLI Entry Point
        run: mekong --help
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Lint (Ruff)
        run: ruff check src/ tests/

      - name: Format Check (Ruff)
        run: ruff format --check src/ tests/
        continue-on-error: true

      - name: Test (Pytest)
        run: pytest tests/ --ignore=tests/backend --ignore=tests/e2e --ignore=tests/integration --ignore=tests/unit --ignore=tests/benchmarks -v --tb=short --cov=src --cov-fail-under=80
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

  # ------------------------------------------------------------------
  # JOB 2: AGI BENCHMARKS
  # ------------------------------------------------------------------
  benchmarks:
    name: AGI Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio "httpx<0.28" pytest-cov
          pip install -e .

      - name: Run AGI Benchmarks
        run: python3 -m pytest tests/benchmarks/test_agi_tasks.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ------------------------------------------------------------------
  # JOB 3: SECURITY AUDIT (Python-focused)
  # ------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Security Scan (Bandit)
        run: bandit -r src/ -ll --exit-zero
        continue-on-error: true

      - name: Dependency Check (Safety)
        run: safety check -r requirements.txt --ignore 70612
        continue-on-error: true

      - name: Check for exposed secrets
        run: |
          echo "Checking for hardcoded secrets (not env var references)..."
          # Check for hardcoded secrets (not env var references)
          if grep -rE "(API_KEY|SECRET|PASSWORD)\s*=\s*['\"][^'\"]+['\"]" src/ --include="*.py" --include="*.ts" --include="*.js" 2>/dev/null | grep -v "test" | grep -v ".env.example" | grep -v "os.getenv" | grep -v "os.environ"; then
            echo "❌ Found hardcoded secrets in source code!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ------------------------------------------------------------------
  # JOB 2: FRONTEND (Landing Page)
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (Landing)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd frontend/landing && npm ci

      - name: Build
        run: cd frontend/landing && npm run build
