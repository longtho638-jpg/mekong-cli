name: AgencyOS Landing CI

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/agencyos-landing/**'
      - '.github/workflows/agencyos-landing-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/agencyos-landing/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: apps/agencyos-landing

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run lint

      - name: Type check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run typecheck

      - name: Test
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm test

      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://agencyos.dev
          NEXT_PUBLIC_POLAR_PRICE_STARTER: placeholder
          NEXT_PUBLIC_POLAR_PRICE_PRO: placeholder
