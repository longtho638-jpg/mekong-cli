name: Publish Open Source Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - core
          - agents
          - all

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        package: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'all' && fromJSON('["core", "agents"]') || fromJSON(format('["{0}"]', github.event.inputs.package))) || fromJSON('["core", "agents"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @agencyos/${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: |
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Guard: Never publish proprietary packages
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Verify no proprietary leak
        run: |
          echo "✅ Only packages/core and packages/agents are published"
          echo "❌ apps/openclaw-worker, antigravity-proxy are NEVER published"
          echo "Guard check passed."
