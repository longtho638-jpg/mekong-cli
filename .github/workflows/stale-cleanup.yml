name: 🦞 Stale Issue Cleanup

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "🧹 Stale Cleanup"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: |
            🦞 This issue has been inactive for 30 days. It will be closed in 7 days unless there's new activity.

            If this is still relevant, please comment or update.
          stale-pr-message: |
            🦞 This PR has been inactive for 14 days. It will be closed in 7 days unless updated.

            Need help finishing it? Tag `@longtho638-jpg` for guidance.
          close-issue-message: |
            🔒 Closed due to inactivity. Reopen anytime if still needed.
          close-pr-message: |
            🔒 Closed due to inactivity. Feel free to reopen with updates.
          exempt-issue-labels: 'priority/P0,priority/P1,pinned'
          exempt-pr-labels: 'priority/P0,WIP'
