name: Test Suite
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio anyio ruff "httpx<0.28"
          pip install -e .
      - name: Lint
        run: |
          ruff check src/ tests/
      - name: Test with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ --ignore=tests/backend --ignore=tests/e2e --ignore=tests/integration --ignore=tests/unit -v --tb=short --cov=src --cov-config=pyproject.toml --cov-report=term-missing --cov-fail-under=15
