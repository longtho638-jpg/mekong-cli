name: CC CLI CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'requirements.txt'

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install ruff
        run: pip install ruff
      - name: Lint src/
        run: ruff check src/

  test:
    name: Test (Pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio httpx pytest-cov
          pip install -e .
      - name: Run tests
        run: pytest tests/ -x -q --ignore=tests/benchmarks --ignore=tests/e2e --ignore=tests/backend --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
          CI: "true"

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Validate core imports
        run: |
          python -c "from src.core.orchestrator import RecipeOrchestrator; print('✓ orchestrator OK')"
          python -c "from src.core.planner import RecipePlanner; print('✓ planner OK')"
          python -c "from src.core.executor import RecipeExecutor; print('✓ executor OK')"
          python -c "from src.core.verifier import RecipeVerifier; print('✓ verifier OK')"
          python -c "from src.gateway import app; print('✓ gateway OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Verify CLI entry point
        run: mekong --help || echo "CLI entry point not configured yet"
        env:
          PYTHONPATH: ${{ github.workspace }}
