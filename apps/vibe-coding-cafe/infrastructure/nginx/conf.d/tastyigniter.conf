# order.vibecafe.vn → TastyIgniter online ordering
# Container: vibe-tasty (port 80)

# HTTP → HTTPS redirect (uncomment khi SSL ready)
# server {
#     listen 80;
#     server_name order.vibecafe.vn;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name order.vibecafe.vn;

    # SSL placeholder — uncomment khi có cert
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/vibecafe.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vibecafe.vn/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    client_max_body_size 20M;

    location / {
        proxy_pass http://tastyigniter:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
