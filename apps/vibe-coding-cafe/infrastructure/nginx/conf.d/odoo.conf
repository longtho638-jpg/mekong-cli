# erp.vibecafe.vn → Odoo 17 ERP/POS
# Container: vibe-odoo (port 8069, longpolling 8072)

upstream odoo {
    server odoo:8069;
}
upstream odoo-longpolling {
    server odoo:8072;
}

# HTTP → HTTPS redirect (uncomment khi SSL ready)
# server {
#     listen 80;
#     server_name erp.vibecafe.vn;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name erp.vibecafe.vn;

    # SSL placeholder — uncomment khi có cert
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/vibecafe.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vibecafe.vn/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # WebSocket / longpolling
    location /web/websocket {
        proxy_pass http://odoo-longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Longpolling legacy path
    location /longpolling/ {
        proxy_pass http://odoo-longpolling;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
