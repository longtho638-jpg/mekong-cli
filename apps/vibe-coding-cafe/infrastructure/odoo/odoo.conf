[options]
; Odoo 17 — Production Config — VIBE CODING Café
; admin_passwd: override via ADMIN_PASSWD env var or set directly for production
admin_passwd = admin

; ── Database ──────────────────────────────────────────────────
; NOTE: db_host/db_user/db_password are overridden by Odoo entrypoint
; via HOST, USER, PASSWORD environment variables in docker-compose.yml
db_host = postgres
db_port = 5432
db_name = odoo
db_filter = ^odoo$
db_maxconn = 64

; ── Security: hide database list ──────────────────────────────
list_db = False

; ── Addons ────────────────────────────────────────────────────
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; ── Workers (multiprocessing, production) ─────────────────────
workers = 4
max_cron_threads = 2

; ── Longpolling (live chat, notifications) ────────────────────
longpolling_port = 8072

; ── Proxy mode (behind nginx) ─────────────────────────────────
proxy_mode = True

; ── Vietnamese locale (vi_VN) — installed via l10n_vn module ──
; Activate: Settings > Activate developer mode > Translations > Languages > Add vi_VN
; Currency VND: Settings > Accounting > Currencies > Activate VND, set as company currency
; Modules to install: l10n_vn (Vietnamese chart of accounts)
lang = vi_VN

; ── Performance limits ────────────────────────────────────────
limit_time_cpu = 600
limit_time_real = 1200
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192

; ── Logging ───────────────────────────────────────────────────
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = :INFO
