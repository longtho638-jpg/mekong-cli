# VIBE CODING Café — Main Docker Compose
# Shared infrastructure: Nginx, PostgreSQL, Redis
# Run: docker compose -f docker-compose.yml up -d

version: '3.8'

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vibe-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    networks: [vibe-net]
    restart: unless-stopped
    depends_on: [odoo, calcom, pretix, tastyigniter, openwisp, xibo-cms, mixpost, loyalty]

  # ── Shared Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vibe-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-vibe}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [vibe-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-vibe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MySQL (for Xibo CMS) ─────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vibe-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: xibo
      MYSQL_USER: ${MYSQL_USER:-xibo}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [vibe-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Shared Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis-data:/data
    networks: [vibe-net]
    restart: unless-stopped

  # ── Odoo 17 ──────────────────────────────────────────────────
  odoo:
    build:
      context: ./odoo
      dockerfile: Dockerfile
    image: vibe-odoo:17.0
    container_name: vibe-odoo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: postgres
      USER: ${PG_USER:-vibe}
      PASSWORD: ${PG_PASS}
      ODOO_ADMIN_PASS: ${ODOO_ADMIN_PASS}
      PG_USER: ${PG_USER:-vibe}
      PG_PASS: ${PG_PASS}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo/addons:/mnt/extra-addons:ro
      - ./odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo-logs:/var/log/odoo
    networks: [vibe-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Cal.com v4 ───────────────────────────────────────────────
  calcom:
    image: calcom/cal.com:latest
    container_name: vibe-calcom
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${PG_USER:-vibe}:${PG_PASS}@postgres:5432/calcom
      NEXT_PUBLIC_WEBAPP_URL: https://booking.vibecafe.vn
      NEXTAUTH_SECRET: ${CALCOM_AUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY}
    networks: [vibe-net]
    restart: unless-stopped

  # ── pretix ───────────────────────────────────────────────────
  pretix:
    image: pretix/standalone:stable
    container_name: vibe-pretix
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pretix-data:/var/pretix/data
      - ./pretix/pretix.cfg:/etc/pretix/pretix.cfg:ro
    networks: [vibe-net]
    restart: unless-stopped

  # ── TastyIgniter ─────────────────────────────────────────────
  tastyigniter:
    image: tastyigniter/tastyigniter:latest
    container_name: vibe-tasty
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_DATABASE: tastyigniter
      DB_USERNAME: ${PG_USER:-vibe}
      DB_PASSWORD: ${PG_PASS}
    volumes:
      - tasty-data:/var/www/html/storage
    networks: [vibe-net]
    restart: unless-stopped

  # ── OpenWISP ─────────────────────────────────────────────────
  openwisp:
    image: openwisp/openwisp-dashboard:latest
    container_name: vibe-openwisp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_USER: ${PG_USER:-vibe}
      DB_PASS: ${PG_PASS}
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - openwisp-data:/opt/openwisp
    networks: [vibe-net]
    restart: unless-stopped

  # ── Xibo CMS ─────────────────────────────────────────────────
  xibo-cms:
    image: xibosignage/xibo-cms:release-4
    container_name: vibe-xibo
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: xibo
      MYSQL_USER: ${MYSQL_USER:-xibo}
      MYSQL_PASSWORD: ${MYSQL_PASS}
      CMS_SERVER_NAME: cms.vibecafe.vn
    volumes:
      - xibo-data:/var/www/cms
    networks: [vibe-net]
    restart: unless-stopped

  # ── Mixpost (Social Media) ────────────────────────────────────
  mixpost:
    image: inovector/mixpost:latest
    container_name: vibe-mixpost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_DATABASE: mixpost
      DB_USERNAME: ${PG_USER:-vibe}
      DB_PASSWORD: ${PG_PASS}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASS}
    volumes:
      - mixpost-data:/var/www/html/storage
    networks: [vibe-net]
    restart: unless-stopped

  # ── Open Loyalty ──────────────────────────────────────────────
  loyalty:
    image: openloyalty/open-loyalty:latest
    container_name: vibe-loyalty
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${PG_USER:-vibe}:${PG_PASS}@postgres:5432/loyalty
    networks: [vibe-net]
    restart: unless-stopped

networks:
  vibe-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  mysql-data:
  odoo-data:
  odoo-logs:
  pretix-data:
  tasty-data:
  openwisp-data:
  xibo-data:
  mixpost-data:
  nginx-logs:
