name: Algo Trader CI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/algo-trader/**'
      - 'packages/trading-core/**'
      - 'packages/vibe-arbitrage-engine/**'
      - 'packages/vibe-billing-trading/**'

env:
  NODE_VERSION: '20'

defaults:
  run:
    working-directory: apps/algo-trader

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Run tests
        run: npm test -- --ci --forceExit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Build backend
        run: npm run build

      - name: Install dashboard dependencies
        run: npm install
        working-directory: apps/algo-trader/dashboard

      - name: Build dashboard
        run: npx tsc -b && npx vite build
        working-directory: apps/algo-trader/dashboard
