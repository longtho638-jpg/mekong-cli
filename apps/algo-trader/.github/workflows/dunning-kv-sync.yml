name: Dunning KV Sync

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/algo-trader
          npm ci

      - name: Run Dunning KV Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAAS_GATEWAY_URL: ${{ secrets.RAAS_GATEWAY_URL }}
          RAAS_SERVICE_TOKEN: ${{ secrets.RAAS_SERVICE_TOKEN }}
        run: |
          cd apps/algo-trader
          npm run sync-dunning-kv
