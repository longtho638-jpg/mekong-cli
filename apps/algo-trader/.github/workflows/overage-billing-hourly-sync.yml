name: Overage Billing Hourly Sync

on:
  schedule:
    # Runs hourly at minute 15
    - cron: '15 * * * *'
  workflow_dispatch:
    # Manual trigger for testing

env:
  NODE_VERSION: '20.x'
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  RAAS_KV_NAMESPACE_ID: ${{ secrets.RAAS_KV_NAMESPACE_ID }}
  RAAS_GATEWAY_URL: ${{ secrets.RAAS_GATEWAY_URL }}
  RAAS_SERVICE_TOKEN: ${{ secrets.RAAS_SERVICE_TOKEN }}

jobs:
  sync-overage-billing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/algo-trader/package-lock.json

      - name: Install dependencies
        working-directory: apps/algo-trader
        run: npm ci

      - name: Run overage billing sync
        working-directory: apps/algo-trader
        run: npx ts-node src/jobs/overage-billing-sync.ts

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overage-billing-sync-results
          path: apps/algo-trader/overage-results.json
          retention-days: 3
