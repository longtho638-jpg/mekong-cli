name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.ag_proxies/**'

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST"

      - name: Count feat commits since last tag
        id: feat_count
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          FEAT_COUNT=$(git log ${TAG}..HEAD --oneline --grep="^feat" | wc -l | tr -d ' ')
          FIX_COUNT=$(git log ${TAG}..HEAD --oneline --grep="^fix" | wc -l | tr -d ' ')
          TOTAL=$((FEAT_COUNT + FIX_COUNT))
          echo "feat=$FEAT_COUNT" >> $GITHUB_OUTPUT
          echo "fix=$FIX_COUNT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Feat: $FEAT_COUNT, Fix: $FIX_COUNT, Total: $TOTAL"

      - name: Determine version bump
        id: version
        if: steps.feat_count.outputs.total >= 5
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          # Strip v prefix
          VER=${TAG#v}
          MAJOR=$(echo $VER | cut -d. -f1)
          MINOR=$(echo $VER | cut -d. -f2)
          PATCH=$(echo $VER | cut -d. -f3)

          FEAT="${{ steps.feat_count.outputs.feat }}"
          if [ "$FEAT" -ge 3 ]; then
            # Minor bump for 3+ features
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            # Patch bump for fixes
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG"

      - name: Generate release notes
        id: notes
        if: steps.version.outputs.new_tag
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          NEW="${{ steps.version.outputs.new_tag }}"

          echo "## What's Changed" > /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md

          # Features
          FEATS=$(git log ${TAG}..HEAD --oneline --grep="^feat" --format="- %s")
          if [ -n "$FEATS" ]; then
            echo "### ✨ Features" >> /tmp/release_notes.md
            echo "$FEATS" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi

          # Fixes
          FIXES=$(git log ${TAG}..HEAD --oneline --grep="^fix" --format="- %s")
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Fixes" >> /tmp/release_notes.md
            echo "$FIXES" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi

          # Stats
          echo "### 📊 Stats" >> /tmp/release_notes.md
          TOTAL_COMMITS=$(git log ${TAG}..HEAD --oneline | wc -l | tr -d ' ')
          echo "- **$TOTAL_COMMITS commits** since $TAG" >> /tmp/release_notes.md
          echo "- Auto-generated by AGI Factory 🏭" >> /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create Release
        if: steps.version.outputs.new_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW="${{ steps.version.outputs.new_tag }}"
          gh release create "$NEW" \
            --title "$NEW" \
            --notes-file /tmp/release_notes.md \
            --latest
          echo "✅ Released $NEW"
