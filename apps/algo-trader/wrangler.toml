name = "algo-trader-worker"
main = "src/api/gateway.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "algo-trader-prod"
database_id = "472e48f7-2196-4fb5-9a26-180ad134e15b"

[[d1_databases]]
binding = "DB_STAGING"
database_name = "algo-trader-staging"
database_id = "943fd11e-c81a-4342-afa6-7e80aa7a18df"

# KV Namespaces
[[kv_namespaces]]
binding = "KV"
id = "ba8c93a931524b7e97027dbad43b31c0"
preview_id = "ba8c93a931524b7e97027dbad43b31c0"

[[kv_namespaces]]
binding = "BUILD_CACHE"
id = "95df9f174767429ea6e4d2e8c63c982a"

# Queues
[[queues.producers]]
queue = "backtest-queue"
binding = "BACKTEST_QUEUE"

[[queues.producers]]
queue = "scan-queue"
binding = "SCAN_QUEUE"

[[queues.producers]]
queue = "webhook-queue"
binding = "WEBHOOK_QUEUE"

# Queue Consumers
[[queues.consumers]]
queue = "backtest-queue"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "backtest-dlq"

[[queues.consumers]]
queue = "scan-queue"
max_batch_size = 5
max_retries = 3
dead_letter_queue = "scan-dlq"

[[queues.consumers]]
queue = "webhook-queue"
max_batch_size = 20
max_retries = 5
dead_letter_queue = "webhook-dlq"

# R2 Buckets
[[r2_buckets]]
binding = "R2"
bucket_name = "algo-trader-artifacts"

[[r2_buckets]]
binding = "AUDIT_R2"
bucket_name = "algo-trader-audit-logs"

# AI Binding (Cloudflare Workers AI)
[ai]
binding = "AI"

# Cron Triggers (keep Workers warm)
[triggers]
crons = ["*/5 * * * *"]

# Production vars
[vars]
NODE_ENV = "production"
API_VERSION = "1.0.0"

# Staging environment
[env.staging]
name = "algo-trader-staging"
main = "src/api/gateway.ts"

[env.staging.vars]
NODE_ENV = "staging"
API_VERSION = "1.0.0-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "algo-trader-staging"
database_id = "943fd11e-c81a-4342-afa6-7e80aa7a18df"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "f2cf595dec5543dc96f6370bebbc8754"

[[env.staging.kv_namespaces]]
binding = "BUILD_CACHE"
id = "95df9f174767429ea6e4d2e8c63c982a"

[[env.staging.queues.producers]]
queue = "backtest-queue-staging"
binding = "BACKTEST_QUEUE"

[[env.staging.queues.producers]]
queue = "scan-queue-staging"
binding = "SCAN_QUEUE"

