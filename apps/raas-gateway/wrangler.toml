name = "raas-gateway"
main = "index.js"
compatibility_date = "2024-02-06"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
zone_id = "YOUR_CLOUDFLARE_ZONE_ID"
routes = [{ pattern = "raas.agencyos.network", custom_domain = true }]

[vars]
OPENCLAW_URL = ""
DEFAULT_MODEL = "vertexai/gemini-1.5-pro-preview-0514"
BACKEND_URL = ""

# KV namespace for rate limiting counters (TTL-based sliding window)
# Create with: wrangler kv:namespace create "RATE_LIMIT_KV"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# Secrets (set via: wrangler secret put <NAME>)
# SERVICE_TOKEN       — internal service auth token
# TELEGRAM_SECRET_TOKEN — Telegram webhook secret
# MK_API_KEYS         — comma-separated "mk_<key>:<tenantId>:<tier>" entries
#                       e.g. "mk_abc123:tenant1:pro,mk_xyz789:tenant2:free"
