name = "raas-gateway"
main = "index.js"
compatibility_date = "2024-02-06"
account_id = "f691e83094f776311a1bfe3f8b126f1c"
workers_dev = true
# Custom domain: raas.agencyos.network (set via CF Dashboard or DNS CNAME)

[vars]
OPENCLAW_URL = ""
DEFAULT_MODEL = "vertexai/gemini-1.5-pro-preview-0514"
BACKEND_URL = ""
AGENCYOS_WEBHOOK_URL = "https://api.agencyos.network/webhooks/dashboard-update"
AGENCYOS_WEBHOOK_AUTH_TOKEN = "your_webhook_auth_token_here"

# KV namespace for rate limiting counters (TTL-based sliding window)
# Create with: wrangler kv:namespace create "RATE_LIMIT_KV"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "982a12a5ea414244988a51d743eb14e7"
preview_id = "982a12a5ea414244988a51d743eb14e7"

# KV namespace for RaaS usage metering (hourly aggregated metrics)
# Create with: wrangler kv:namespace create "RAAS_USAGE_KV"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "RAAS_USAGE_KV"
id = "placeholder_raas_usage_kv_id"
preview_id = "placeholder_raas_usage_kv_id"

# KV namespace for tenant suspension cache (SUSPENDED/REVOKED status)
# Create with: wrangler kv:namespace create "SUSPENSION_CACHE"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "SUSPENSION_CACHE"
id = "placeholder_suspension_cache_id"
preview_id = "placeholder_suspension_cache_id"

# KV namespace for report ingestion and analytics
# Create with: wrangler kv:namespace create "REPORTS_KV"
# Then replace id below with the output id
[[kv_namespaces]]
binding = "REPORTS_KV"
id = "placeholder_reports_kv_id"
preview_id = "placeholder_reports_kv_id"
