name: hello-world
version: 1.0.0
description: "Hello World SOP for testing"

steps:
  - id: greet
    command: "echo 'Hello from AGI SOPs!'"
    timeout: 10
    validation: "exit_code == 0"
    description: "Print greeting message"

  - id: show-version
    command: "python3 --version"
    timeout: 10
    validation: "exit_code == 0"
    description: "Show Python version"

  - id: list-files
    command: "ls -la"
    timeout: 30
    validation: "exit_code == 0"
    description: "List current directory files"

quality_gates:
  - name: all_steps_passed
    check: "echo 'All steps completed successfully'"
    description: "Verify all steps passed"
