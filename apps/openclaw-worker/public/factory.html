<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏭 Vibe Factory</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, className }) => <i data-lucide={name} className={className}></i>;

const phases = [
  {
    id: "tps",
    title: "🏭 Toyota → Claude Code",
    subtitle: "Mapping nguyên lý TPS sang Agentic Coding",
    color: "#DC2626",
    accent: "#FEE2E2",
    items: [
      {
        toyota: "Jidoka (自働化) — Dừng ngay khi lỗi",
        claude: "Hooks + Verification Protocol",
        detail:
          "Cấu hình hooks chạy lint, type-check, test SAU MỖI file edit. Nếu fail → agent tự dừng, tự fix trước khi tiếp. Không bao giờ để lỗi lan sang bước sau.",
        code: `# .claude/settings.json - Hook chạy sau mỗi file edit
{
  "hooks": {
    "PostEditFile": [{
      "matcher": "**/*.{ts,tsx}",
      "command": "npx tsc --noEmit && npx eslint --fix"
    }],
    "PreCommit": [{
      "command": "npm test -- --bail"
    }]
  }
}`,
      },
      {
        toyota: "Kanban (看板) — Pull system, giới hạn WIP",
        claude: "Task Board + Subagent Orchestration",
        detail:
          "Dùng Tasks system native của Claude Code. Mỗi task = 1 card trên kanban. Agent chỉ pull task khi xong task trước. Không overload context window.",
        code: `# CLAUDE.md - Kanban rules
## Workflow Rules
- Maximum 1 active task per agent at a time
- Each task must pass verification before marking DONE
- Use /clear between tasks to prevent context drift
- Track progress in tasks.md with status: TODO|WIP|REVIEW|DONE`,
      },
      {
        toyota: "Heijunka (平準化) — Cân bằng tải",
        claude: "Worktree + Parallel Agents",
        detail:
          "Chia công việc thành các luồng song song bằng git worktree. Mỗi agent chạy isolated, không đụng nhau. 3-4 worktree là sweet spot.",
        code: `# Chạy 3 agents song song, mỗi cái 1 worktree riêng
claude --worktree feature-auth --tmux
claude --worktree feature-api --tmux  
claude --worktree feature-ui --tmux

# Hoặc dùng subagent với isolation
# .claude/agents/builder.md
---
name: builder
isolation: worktree
---
Build the feature following the spec exactly.
Run tests before reporting completion.`,
      },
      {
        toyota: "Kaizen (改善) — Cải tiến liên tục",
        claude: "Adversarial QA Loop",
        detail:
          "Sau mỗi output, chạy 1 agent critic riêng review. Agent critic phải tìm ít nhất 3 vấn đề. Loop cho đến khi quality score đạt threshold.",
        code: `# .claude/agents/critic.md
---
name: critic
description: Adversarial code reviewer
model: opus
allowedTools: ["Read", "Grep", "Glob", "Task"]
---
You are a harsh but fair code critic.
Review the implementation against the spec.
Find AT LEAST 3 real issues. Be specific.
Rate quality 1-10. Must score 8+ to pass.
DO NOT rubber-stamp. If it's bad, say so.`,
      },
      {
        toyota: "Poka-yoke (ポカヨケ) — Chống lỗi ngớ ngẩn",
        claude: "CLAUDE.md Guardrails + Constraints",
        detail:
          "Viết rõ ràng những gì KHÔNG được làm trong CLAUDE.md. Đây là 'hiến pháp' của project — agent đọc mỗi session.",
        code: `# CLAUDE.md - Poka-yoke constraints
## NEVER DO
- Never modify files outside src/ directory
- Never install new dependencies without asking
- Never change database schema without migration
- Never skip tests, even for "small" changes
- Never use any instead of proper TypeScript types
- Never expand scope beyond the current task

## ALWAYS DO  
- Run tests after every code change
- Type-check before committing
- Write tests for new functions
- Keep functions under 50 lines`,
      },
    ],
  },
  {
    id: "pipeline",
    title: "⚡ Dây Chuyền Sản Xuất",
    subtitle: "Pipeline 5 bước — từ Spec đến Ship",
    color: "#2563EB",
    accent: "#DBEAFE",
    items: [
      {
        step: "① SPEC",
        time: "5-10 phút",
        who: "Con người",
        detail:
          "Viết spec rõ ràng: mục tiêu, acceptance criteria, constraints, edge cases. Đừng nói 'build a dashboard' — nói rõ dashboard cho ai, data gì, interaction nào.",
        code: `# specs/feature-xyz.md
## Goal
User authentication with OAuth2 + email/password

## Acceptance Criteria
- [ ] Google OAuth login works end-to-end
- [ ] Email/password with bcrypt hashing  
- [ ] JWT tokens with 15min access + 7d refresh
- [ ] Rate limit: 5 failed attempts → 15min lockout

## Constraints
- Use existing Prisma schema
- No new dependencies except passport-google-oauth20
- All endpoints must have integration tests

## Out of Scope
- Social login (Facebook, GitHub) — later sprint
- 2FA — separate ticket`,
      },
      {
        step: "② PLAN",
        time: "2-3 phút (agent)",
        who: "Claude Code Plan Mode",
        detail:
          "Bật Plan Mode (Shift+Tab). Agent đọc codebase, đọc spec, tạo plan. Con người review plan TRƯỚC khi code. Đây là checkpoint quan trọng nhất.",
        code: `# Prompt cho planning phase
claude --plan "Read specs/feature-xyz.md and the existing 
codebase. Create a detailed implementation plan.

List:
1. Files to create/modify (with exact paths)
2. Dependencies needed
3. Database changes (if any)
4. Test plan
5. Risks and unknowns

DO NOT write any code yet. Plan only."`,
      },
      {
        step: "③ BUILD",
        time: "10-30 phút (agent)",
        who: "Builder Subagents + Worktrees",
        detail:
          "Orchestrator chia plan thành tasks, spawn subagents chạy song song trong worktrees riêng. Mỗi agent có context window sạch.",
        code: `# Orchestrator prompt
"Execute the approved plan for feature-xyz.

Spawn subagents with worktree isolation:
- Agent 1: API routes + controllers  
- Agent 2: Database models + migrations
- Agent 3: Tests

Each agent must:
1. Work ONLY on assigned files
2. Run type-check after each file
3. Report completion with summary

Merge results when all agents complete."`,
      },
      {
        step: "④ VERIFY",
        time: "3-5 phút (agent)",
        who: "Critic Agent + Auto Tests",
        detail:
          "Chạy critic agent review toàn bộ diff. Chạy full test suite. Quality gate: phải đạt 8/10 từ critic VÀ 100% tests pass.",
        code: `# Verification protocol tự động
# .claude/rules/verification-protocol.md

After ANY implementation:
1. Run: npm test -- --coverage
2. Run: npx tsc --noEmit  
3. Spawn critic agent to review all changes
4. If critic score < 8/10 → fix and re-verify
5. If tests fail → fix and re-run
6. Max 3 fix loops, then escalate to human
7. Only report DONE when ALL gates pass`,
      },
      {
        step: "⑤ SHIP",
        time: "2 phút",
        who: "Con người approve → Auto deploy",
        detail:
          "Human review final diff (đã qua QA rồi nên nhẹ). Approve → auto merge → CI/CD deploy. Agent viết commit message + PR description.",
        code: `# Auto PR creation
claude -p "Create a PR for the feature-xyz branch.
Include:
- Summary of changes
- Test results  
- Screenshots if UI changes
- Link to spec: specs/feature-xyz.md

Use conventional commits format."

# GitHub Actions chạy thêm 1 lần nữa
# với Claude Code reviewer agent trong CI`,
      },
    ],
  },
  {
    id: "optimize",
    title: "🚀 Tối Ưu Tốc Độ",
    subtitle: "Tricks để ra hàng nhanh mà không tăng lỗi",
    color: "#059669",
    accent: "#D1FAE5",
    items: [
      {
        tip: "Slash Commands = Công cụ chuẩn hoá",
        detail:
          "Tạo custom slash commands cho mọi workflow lặp lại. Team ai cũng chạy giống nhau, không sai bước.",
        code: `# .claude/commands/build-feature.md
Read the spec at $ARGUMENTS
1. Analyze current codebase architecture
2. Create implementation plan (show me first)
3. After I approve, implement with worktree isolation
4. Run full verification protocol
5. Create PR with summary

# Sử dụng:
# /build-feature specs/feature-xyz.md`,
      },
      {
        tip: "/clear giữa mỗi task = Reset dây chuyền",
        detail:
          "Context window bị pollute sau mỗi task lớn. /clear để fresh start. Memory file (CLAUDE.md) vẫn còn nên không mất context dài hạn.",
        code: `# Quy trình giữa các tasks:
# 1. Task hoàn thành → commit  
# 2. /clear (reset context window)
# 3. Agent tự động đọc lại CLAUDE.md
# 4. Bắt đầu task mới với context sạch

# Trong CLAUDE.md, giữ project state:
## Current Sprint  
- [x] Feature Auth (PR #42)
- [ ] Feature API Gateway ← NEXT
- [ ] Feature Dashboard`,
      },
      {
        tip: "Competitive Agents = Chọn solution tốt nhất",
        detail:
          "Spawn 2-3 agents cùng làm 1 task nhưng trong worktrees khác nhau. LLM non-determinism = 2-3 solutions khác nhau. Chọn cái tốt nhất.",
        code: `# Spawn 3 competitive agents
claude --worktree solution-1 --tmux
claude --worktree solution-2 --tmux
claude --worktree solution-3 --tmux

# Cùng prompt, khác implementation
# So sánh kết quả:
./scripts/sync-worktrees.sh --interactive

# Merge winner:
git checkout main
git merge worktree-solution-2`,
      },
      {
        tip: "Tầng Model = Tiết kiệm mà vẫn chất lượng",
        detail:
          "Không phải task nào cũng cần Opus. Plan + Review = Opus. Build = Sonnet. Quick fix = Haiku. Giống Toyota dùng đúng máy cho đúng công đoạn.",
        code: `# .claude/agents/ - Mỗi agent dùng model phù hợp

# architect.md (planning) → Opus
---
name: architect  
model: opus
allowedTools: ["Read", "Grep", "Glob"]
---

# builder.md (implementation) → Sonnet  
---
name: builder
model: sonnet
isolation: worktree
---

# reviewer.md (QA) → Opus
---
name: reviewer
model: opus
allowedTools: ["Read", "Grep", "Glob"]
---`,
      },
      {
        tip: "Agent Teams cho dự án lớn",
        detail:
          "Khác subagents (1 chiều, báo cáo về), Agent Teams có thể nhắn tin cho nhau, share task board, tự coordinate. Dùng cho feature phức tạp cần nhiều agent phối hợp.",
        code: `# Agent Teams workflow
"Create a team to build the payment system:

Team Lead: Architect agent (plans + coordinates)
Teammate 1: API builder (backend routes)
Teammate 2: UI builder (frontend components)  
Teammate 3: Test writer (integration tests)

Rules:
- API builder must share endpoint contracts 
  with UI builder before either starts coding
- Test writer starts after API contracts are final
- All teammates report blockers to Team Lead
- Team Lead resolves conflicts and merges"`,
      },
      {
        tip: "CI/CD = Quality Gate cuối cùng",
        detail:
          "Chạy Claude Code agent TRONG GitHub Actions/GitLab CI để auto-review mọi PR. Double-check lần cuối trước khi merge vào main.",
        code: `# .github/workflows/ai-review.yml
name: AI Code Review
on: [pull_request]
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AI Review
        run: |
          claude -p "Review this PR diff. 
          Check for:
          - Security vulnerabilities
          - Performance issues  
          - Missing error handling
          - Test coverage gaps
          Post review as PR comment."`,
      },
    ],
  },
];

const speedMetrics = [
  { label: "Vibe Coding thường", time: "2-4h / feature", defect: "30-50% rework", icon: "🐌" },
  { label: "Factory Pipeline", time: "30-60m / feature", defect: "5-10% rework", icon: "🏭" },
  { label: "Factory + Parallel", time: "15-30m / feature", defect: "5-10% rework", icon: "🚀" },
];

function VibeCodingFactory() {
  const [activePhase, setActivePhase] = useState("tps");
  const [expandedItem, setExpandedItem] = useState(null);

  const currentPhase = phases.find((p) => p.id === activePhase);

  return (
    <div
      style={{
        fontFamily: "'JetBrains Mono', 'SF Mono', 'Fira Code', monospace",
        background: "#0A0A0A",
        color: "#E5E5E5",
        minHeight: "100vh",
        padding: "0",
      }}
    >
      {/* Header */}
      <div
        style={{
          background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
          padding: "32px 24px",
          borderBottom: "2px solid #DC2626",
          position: "relative",
          overflow: "hidden",
        }}
      >
        <div
          style={{
            position: "absolute",
            top: 0,
            left: 0,
            right: 0,
            bottom: 0,
            background:
              "repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(220,38,38,0.03) 40px, rgba(220,38,38,0.03) 41px)",
          }}
        />
        <div style={{ position: "relative", maxWidth: 900, margin: "0 auto" }}>
          <div
            style={{
              fontSize: 11,
              letterSpacing: 4,
              color: "#DC2626",
              marginBottom: 8,
              textTransform: "uppercase",
            }}
          >
            production system 2026
          </div>
          <h1
            style={{
              fontSize: "clamp(24px, 5vw, 36px)",
              fontWeight: 800,
              margin: 0,
              lineHeight: 1.2,
              background: "linear-gradient(90deg, #fff 0%, #94a3b8 100%)",
              WebkitBackgroundClip: "text",
              WebkitTextFillColor: "transparent",
            }}
          >
            VIBE CODING FACTORY
          </h1>
          <p style={{ fontSize: 14, color: "#94A3B8", margin: "8px 0 0", lineHeight: 1.5 }}>
            Claude Code × Toyota Production System — Dây chuyền sản xuất code hạn chế lỗi, tốc
            độ cao
          </p>
        </div>
      </div>

      {/* Speed Comparison */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 24px 0" }}>
        <div
          style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))",
            gap: 12,
          }}
        >
          {speedMetrics.map((m, i) => (
            <div
              key={i}
              style={{
                background: i === 2 ? "rgba(5,150,105,0.15)" : "rgba(255,255,255,0.03)",
                border: `1px solid ${i === 2 ? "rgba(5,150,105,0.4)" : "rgba(255,255,255,0.08)"}`,
                borderRadius: 8,
                padding: "16px",
                textAlign: "center",
              }}
            >
              <div style={{ fontSize: 28, marginBottom: 6 }}>{m.icon}</div>
              <div style={{ fontSize: 12, color: "#94A3B8", marginBottom: 4 }}>{m.label}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: i === 2 ? "#34D399" : "#E5E5E5" }}>
                {m.time}
              </div>
              <div
                style={{
                  fontSize: 11,
                  color: i === 0 ? "#F87171" : "#34D399",
                  marginTop: 4,
                }}
              >
                {m.defect}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Phase Tabs */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px 0" }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {phases.map((p) => (
            <button
              key={p.id}
              onClick={() => {
                setActivePhase(p.id);
                setExpandedItem(null);
              }}
              style={{
                padding: "10px 18px",
                borderRadius: 6,
                border: `1px solid ${activePhase === p.id ? p.color : "rgba(255,255,255,0.1)"}`,
                background: activePhase === p.id ? `${p.color}22` : "transparent",
                color: activePhase === p.id ? p.color : "#94A3B8",
                cursor: "pointer",
                fontSize: 13,
                fontWeight: 600,
                fontFamily: "inherit",
                transition: "all 0.2s",
              }}
            >
              {p.title}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 24px 40px" }}>
        <p style={{ fontSize: 13, color: "#64748B", margin: "0 0 16px" }}>
          {currentPhase.subtitle}
        </p>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {currentPhase.items.map((item, idx) => {
            const key = `${activePhase}-${idx}`;
            const isOpen = expandedItem === key;
            const label = item.toyota || item.step || item.tip;

            return (
              <div
                key={key}
                style={{
                  border: `1px solid ${isOpen ? currentPhase.color + "66" : "rgba(255,255,255,0.08)"}`,
                  borderRadius: 8,
                  background: isOpen ? `${currentPhase.color}08` : "rgba(255,255,255,0.02)",
                  overflow: "hidden",
                  transition: "all 0.2s",
                }}
              >
                <button
                  onClick={() => setExpandedItem(isOpen ? null : key)}
                  style={{
                    width: "100%",
                    padding: "14px 18px",
                    background: "none",
                    border: "none",
                    color: "#E5E5E5",
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "flex-start",
                    gap: 12,
                    fontFamily: "inherit",
                    textAlign: "left",
                  }}
                >
                  <span
                    style={{
                      color: currentPhase.color,
                      fontSize: 18,
                      lineHeight: 1,
                      transition: "transform 0.2s",
                      transform: isOpen ? "rotate(90deg)" : "none",
                      flexShrink: 0,
                      marginTop: 1,
                    }}
                  >
                    ▸
                  </span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.4 }}>{label}</div>
                    {item.claude && (
                      <div
                        style={{
                          fontSize: 12,
                          color: currentPhase.color,
                          marginTop: 3,
                          opacity: 0.8,
                        }}
                      >
                        → {item.claude}
                      </div>
                    )}
                    {item.who && (
                      <div style={{ fontSize: 12, color: "#64748B", marginTop: 3 }}>
                        {item.who} · {item.time}
                      </div>
                    )}
                  </div>
                </button>

                {isOpen && (
                  <div style={{ padding: "0 18px 18px 48px" }}>
                    <p
                      style={{
                        fontSize: 13,
                        color: "#B0B0B0",
                        lineHeight: 1.7,
                        margin: "0 0 14px",
                      }}
                    >
                      {item.detail}
                    </p>
                    <pre
                      style={{
                        background: "#111",
                        border: "1px solid rgba(255,255,255,0.08)",
                        borderRadius: 6,
                        padding: 14,
                        fontSize: 12,
                        lineHeight: 1.6,
                        overflowX: "auto",
                        margin: 0,
                        color: "#A5F3FC",
                        whiteSpace: "pre-wrap",
                        wordBreak: "break-word",
                      }}
                    >
                      {item.code}
                    </pre>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Bottom Summary */}
      <div
        style={{
          maxWidth: 900,
          margin: "0 auto",
          padding: "0 24px 40px",
        }}
      >
        <div
          style={{
            background: "linear-gradient(135deg, rgba(220,38,38,0.08), rgba(37,99,235,0.08))",
            border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: 10,
            padding: 24,
          }}
        >
          <h3 style={{ fontSize: 15, margin: "0 0 12px", color: "#F1F5F9" }}>
            TL;DR — Factory Checklist
          </h3>
          <div
            style={{
              fontSize: 13,
              color: "#94A3B8",
              lineHeight: 2,
            }}
          >
            {[
              "✅ CLAUDE.md = Hiến pháp project (guardrails + constraints)",
              "✅ Hooks = Jidoka (auto lint/test sau mỗi edit)",
              "✅ Spec trước, Plan trước, rồi mới Build",
              "✅ Worktrees = Parallel production lines (3-4 max)",
              "✅ Critic agent = QA inspector (phải score 8+/10)",
              "✅ /clear giữa tasks = Reset dây chuyền",
              "✅ Slash commands = SOP chuẩn hoá cho team",
              "✅ Opus plan/review, Sonnet build, Haiku quick fix",
            ].map((line, i) => (
              <div key={i}>{line}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<VibeCodingFactory />);
    </script>
    <script>
        setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
