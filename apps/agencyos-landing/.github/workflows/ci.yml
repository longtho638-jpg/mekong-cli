name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/agencyos-landing/package-lock.json

      - name: Install dependencies
        working-directory: apps/agencyos-landing
        run: npm ci

      - name: Lint
        working-directory: apps/agencyos-landing
        run: npm run lint

      - name: Type check
        working-directory: apps/agencyos-landing
        run: npm run typecheck

      - name: Build
        working-directory: apps/agencyos-landing
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://agencyos.dev
          NEXT_PUBLIC_POLAR_PRICE_STARTER: placeholder
          NEXT_PUBLIC_POLAR_PRICE_PRO: placeholder
