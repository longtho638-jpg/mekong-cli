# Mekong CLI — Default LLM Provider Configuration
#
# Providers are tried in order. The first healthy provider handles each request.
# Circuit breaker: after 3 failures, a provider cools down for 60 seconds.
#
# Add your own provider by appending to this list.
# Set api_key_env to the environment variable that holds your API key.
# The key is never stored here — only the env var name.

providers:
  # Google Gemini (via google-genai SDK)
  - type: gemini
    model: gemini-2.5-pro
    api_key_env: GEMINI_API_KEY

  # OpenAI-compatible proxy (Antigravity, LiteLLM, etc.)
  # Set LLM_BASE_URL env var to your proxy URL.
  - type: openai_compatible
    name: proxy
    base_url_env: LLM_BASE_URL  # resolved at runtime; omit entry if not needed
    model: gemini-2.5-pro
    api_key_env: OPENAI_API_KEY
    timeout: 60

  # Direct OpenAI
  - type: openai_compatible
    name: openai
    base_url: https://api.openai.com/v1
    model: gpt-4o
    api_key_env: OPENAI_API_KEY
    timeout: 60

  # Local Ollama (no API key needed)
  - type: openai_compatible
    name: ollama
    base_url: http://localhost:11434/v1
    model: llama3
    timeout: 120
